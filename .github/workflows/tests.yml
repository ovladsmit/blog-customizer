name: Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Check if the repository is private
        if: ${{ github.event.repository.private }}
        run: exit 1

      - name: Install project dependencies
        run: npm ci

      - name: Get testing lib
        run: git clone https://github.com/Yandex-Practicum/tests-blog-customizer.git /tmp/tests-blog-customizer

      - name: Install test dependencies
        run: npm ci --prefix /tmp/tests-blog-customizer

      - name: Install Playwright browsers
        run: npx --prefix /tmp/tests-blog-customizer playwright install chromium --with-deps

      - name: Run tests
        run: bash /tmp/tests-blog-customizer/run.sh

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report
          path: /tmp/tests-blog-customizer/tmp/artifacts
          retention-days: 30